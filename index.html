<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula-X: Web3 Colony</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #94a3b8; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        .neon-border { border: 1px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .resource-bar { transition: width 0.5s ease-in-out; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #space-canvas { filter: brightness(1.2) contrast(1.1); }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <!-- TOP HUD -->
    <header class="flex justify-between items-center px-6 py-4 glass-panel rounded-2xl mb-4">
        <div class="flex gap-8">
            <div>
                <p class="text-[10px] text-blue-400 uppercase tracking-widest">Energy Core</p>
                <div class="w-32 h-2 bg-slate-800 rounded-full mt-1 overflow-hidden">
                    <div id="energyBar" class="resource-bar h-full bg-blue-500 w-full"></div>
                </div>
            </div>
            <div>
                <p class="text-[10px] text-emerald-400 uppercase tracking-widest">Stardust Credits</p>
                <p id="credits" class="text-xl font-bold text-white">0.00</p>
            </div>
        </div>
        <button id="authBtn" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-white font-black transition-all shadow-[0_0_20px_rgba(59,130,246,0.5)]">
            AUTH COMMAND
        </button>
    </header>

    <main class="flex-1 relative flex gap-4">
        <!-- GAME CANVAS -->
        <div class="flex-1 glass-panel rounded-3xl relative overflow-hidden flex items-center justify-center">
            <canvas id="space-canvas" class="w-full h-full"></canvas>
            
            <!-- WEB3 LOCK SCREEN -->
            <div id="lockScreen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/90 backdrop-blur-md">
                <div class="w-24 h-24 border-t-4 border-blue-500 rounded-full animate-spin mb-6"></div>
                <h2 class="text-3xl font-black text-white tracking-widest">SYSTEM OFFLINE</h2>
                <p class="mt-2 text-slate-500">SIGN ENCRYPTED KEY TO INITIALIZE COLONY</p>
            </div>
        </div>

        <!-- SIDE CONTROL UNIT -->
        <aside class="w-80 flex flex-col gap-4">
            <div class="glass-panel p-6 rounded-2xl">
                <h3 class="text-sm font-bold text-blue-400 mb-4 tracking-tighter uppercase">Command Center</h3>
                <button id="mineBtn" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl mb-3 text-xs tracking-widest hover:text-white transition-all">
                    EXTRACT RESOURCES
                </button>
                <button id="upgradeBtn" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-xs tracking-widest hover:text-white transition-all">
                    UPGRADE CORE (-50 CR)
                </button>
            </div>

            <div class="glass-panel p-6 rounded-2xl flex-1">
                <h3 class="text-sm font-bold text-slate-500 mb-4 uppercase">System Logs</h3>
                <div id="logs" class="text-[10px] space-y-2 font-mono h-64 overflow-y-auto">
                    <p class="text-blue-500">> SYSTEM INITIALIZING...</p>
                </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
